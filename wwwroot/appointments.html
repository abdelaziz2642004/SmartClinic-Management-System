<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المواعيد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        .badge-Pending {
            background: #ffc107;
            color: #000;
        }

        .badge-Confirmed {
            background: #198754;
            color: #fff;
        }

        .badge-Cancelled {
            background: #dc3545;
            color: #fff;
        }

        .badge-Completed {
            background: #0d6efd;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4">🏥 لوحة تحكم المواعيد</h2>

        <!-- جدول المواعيد -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>قائمة المواعيد</span>
                <button class="btn btn-sm btn-primary" onclick="loadAppointments()">🔄 تحديث</button>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center d-none">
                    <div class="spinner-border text-primary"></div>
                </div>
                <table class="table table-hover" id="appointmentsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المريض</th>
                            <th>الطبيب</th>
                            <th>التاريخ</th>
                            <th>الوقت</th>
                            <th>الحالة</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsBody">
                        <tr><td colspan="7" class="text-center text-muted">اضغط تحديث لتحميل البيانات</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- فورم حجز موعد -->
        <div class="card">
            <div class="card-header">➕ حجز موعد جديد</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">ID المريض</label>
                        <input type="number" id="patientId" class="form-control" placeholder="1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">ID الطبيب</label>
                        <input type="number" id="doctorId" class="form-control" placeholder="1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">التاريخ</label>
                        <input type="date" id="appointmentDate" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">الوقت</label>
                        <input type="time" id="appointmentTime" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ملاحظات</label>
                        <input type="text" id="message" class="form-control" placeholder="أي ملاحظات...">
                    </div>
                    <div class="col-12">
                        <button class="btn btn-success" onclick="createAppointment()">حجز الموعد</button>
                    </div>
                </div>
                <div id="formMsg" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script>
const API = 'http://localhost:5123/api/Appointments';

async function loadAppointments() {
    document.getElementById('loading').classList.remove('d-none');
    try {
        const res = await fetch(API);
        const data = await res.json();
        renderTable(data);
    } catch (e) {
        document.getElementById('appointmentsBody').innerHTML =
            '<tr><td colspan="7" class="text-danger text-center">خطأ في الاتصال بالـ API</td></tr>';
    }
    document.getElementById('loading').classList.add('d-none');
}

function renderTable(data) {
    const tbody = document.getElementById('appointmentsBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">لا توجد مواعيد</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(a => `
        <tr>
            <td>${a.appointmentId}</td>
            <td>${a.patientId}</td>
            <td>${a.doctorId}</td>
            <td>${a.appointmentDate?.split('T')[0]}</td>
            <td>${a.appointmentTime}</td>
            <td><span class="badge badge-${a.status}">${a.status}</span></td>
            <td>
                ${a.status === 'Pending' ? `<button class="btn btn-sm btn-success me-1" onclick="confirm_appt(${a.appointmentId})">✅ تأكيد</button>` : ''}
                ${a.status !== 'Cancelled' && a.status !== 'Completed' ? `<button class="btn btn-sm btn-warning me-1" onclick="cancel_appt(${a.appointmentId})">❌ إلغاء</button>` : ''}
                ${a.status === 'Confirmed' ? `<button class="btn btn-sm btn-primary" onclick="complete_appt(${a.appointmentId})">🏁 إنهاء</button>` : ''}
            </td>
        </tr>
    `).join('');
}

async function createAppointment() {
    const body = {
        patientId: parseInt(document.getElementById('patientId').value),
        doctorId: parseInt(document.getElementById('doctorId').value),
        appointmentDate: document.getElementById('appointmentDate').value,
        appointmentTime: document.getElementById('appointmentTime').value + ':00',
        message: document.getElementById('message').value
    };
    const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    const msg = document.getElementById('formMsg');
    if (res.ok) {
        msg.innerHTML = '<div class="alert alert-success">✅ تم حجز الموعد بنجاح!</div>';
        loadAppointments();
    } else {
        msg.innerHTML = '<div class="alert alert-danger">❌ خطأ في الحجز - تأكد من البيانات</div>';
    }
}

async function confirm_appt(id) {
    await fetch(`${API}/${id}/confirm`, { method: 'PUT' });
    loadAppointments();
}

async function cancel_appt(id) {
    await fetch(`${API}/${id}/cancel`, { method: 'PUT' });
    loadAppointments();
}

async function complete_appt(id) {
    await fetch(`${API}/${id}/complete`, { method: 'PUT' });
    loadAppointments();
}

loadAppointments();
    </script>
</body>
</html>
