<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="CSS/all.min.css" />
  <link rel="stylesheet" href="CSS/normalize.css" />
  <link rel="stylesheet" href="CSS/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
  <title>Log-in</title>
</head>

<body>
  <div class="login">
    <div class="content">
      <h1>Login</h1>
      <div class="sec-logo">
        <a href="home.html">Home</a>
        <i class="fa-solid fa-chevron-right"></i>
        <a href="index.html">Login</a>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="parent">
      <div class="form-box log-in">
        <form action="" method="POST" id="loginForm">
          <h1>Login</h1>
          <div class="input-box">
            <input type="email" name="email" placeholder="email" required id="loginEmail" />
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input-box registerationInput">
            <input type="password" name="password" placeholder="password" required id="password" />
            <i class="fa-solid fa-eye-slash" id="login-eye-slash" onclick="show('login')"></i>
            <i class="fa-solid fa-eye" id="login-eye" onclick="show('login')"></i>
          </div>
          <div class="forget">
            <div class="remember">
              <input id="remember" type="checkbox" name="remember" value="Remember Me" class="scl" />
              <label for="remember">Remember Me</label>
            </div>
            <a href="verification.html">Forget Password ?</a>
          </div>
          <div id="loginMsg" class="passConfirmAlert" style="display:none;"></div>
          <button type="submit" name="login" class="btn">Log-in</button>
        </form>
      </div>
      <div class="form-box register">
        <form action="" method="post" id="registerForm">
          <h1>Registration</h1>
          <input type="hidden" name="user_type" value="Patient" />
          <div class="input-box special">
            <input type="text" name="first_name" placeholder="First Name" required id="firstName" />
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input-box special">
            <input type="text" name="last_name" placeholder="Last Name" required id="lastName" />
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="input-box">
            <input type="email" name="register_email" placeholder="Email" required id="registerEmail" />
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input-box special">
            <input type="tel" name="phone" placeholder="Phone Number" required id="phone" />
            <i class="fa-solid fa-phone"></i>
          </div>
          <div class="input-box special">
            <select name="gender" required id="gender" style="width:100%;padding:10px;border:none;background:transparent;">
              <option value="" disabled selected>Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
          <div class="input-box">
            <input type="text" name="address" placeholder="Address" required id="address" />
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="input-box registerationInput">
            <input type="password" name="register_password" placeholder="Password" required id="register-password" class="pass" />
            <i class="fa-solid fa-eye-slash" id="register-eye-slash" onclick="show('register')"></i>
            <i class="fa-solid fa-eye" id="register-eye" onclick="show('register')"></i>
          </div>
          <div class="input-box passwordConfirmation">
            <input type="password" name="confirm_password" placeholder="Confirm Password" required id="passwordConfirmation" />
          </div>
          <div id="passConfirmAlert" class="passConfirmAlert">
            <span><i class="fa-solid fa-xmark"></i></span><span>Password Are Not matches</span>
          </div>
          <div class="input-box">
            <input type="date" name="birthdate" placeholder="BirthDay" required id="birthdate" />
          </div>
          <div id="registerMsg" class="passConfirmAlert" style="display:none;"></div>
          <button type="submit" name="register" class="btn">Register</button>
        </form>
      </div>
      <div class="toogle-box">
        <div class="toogle-panel toogle-left">
          <h1>Welcome Back !</h1>
          <p>Don`t Have An Account ?</p>
          <button class="btn btn-register">Register</button>
        </div>
        <div class="toogle-panel toogle-right">
          <h1>Welcome !</h1>
          <p>Do You Have Account ?</p>
          <button class="btn btn-login">Log-in</button>
        </div>
      </div>
    </div>
  </div>
  <script src="Java/api.js"></script>
  <script src="Java/login.js"></script>
</body>

</html>
