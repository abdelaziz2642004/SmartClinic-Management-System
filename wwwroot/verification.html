<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <link rel="stylesheet" href="CSS/all.min.css" />
    <link rel="stylesheet" href="CSS/normalize.css" />
    <link rel="stylesheet" href="CSS/verification.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="login">
        <div class="content">
            <h1>Verification</h1>
            <div class="sec-logo">
                <a href="home.html">Home</a>
                <i class="fa-solid fa-chevron-right"></i>
                <a href="index.html">Login</a>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="box">
            <div class="img">
                <img src="images/login-banner.png" alt="">
            </div>
            <div class="message">
                    <h2>Reset Your Password</h2>
                    <p>Enter your email and we will send you a reset link with a verification code.</p>

                    <form method="POST" >
                        <label>Email Address <span>*</span></label>
                        <input type="email" name="email" required>

                        <button style="margin-top: 10px;" type="submit" id="btn" onclick="window.location.href='/resetpassword.html'">Send Reset Link</button>
                    </form>
            </div>
        </div>
    </div>
</body>

</html>
