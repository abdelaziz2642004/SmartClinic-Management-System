<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Appointment Status</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
    }

    .icon {
      font-size: 50px;
      color: orange;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 15px;
    }

    p {
      color: #555;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="icon">⏳</div>

    <h2>Appointment Pending</h2>

    <p>
      Your appointment has been successfully booked.  
      Please wait for the doctor's confirmation.  
      You will be able to complete the payment once approved.
    </p>

    <button onclick="goHome()">Back to Home</button>
  </div>

  <script>
    function goHome(){
      window.location.href = "home.html";
    }
  </script>

</body>
</html>
