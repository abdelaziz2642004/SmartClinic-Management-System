<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="CSS/resetpassword.css" />
  <link rel="stylesheet" href="CSS/all.min.css" />
  <link rel="stylesheet" href="CSS/normalize.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <div class="login">
    <div class="content">
      <h1>Reset Password</h1>
      <div class="sec-logo">
        <a href="home.html">Home</a>
        <i class="fa-solid fa-chevron-right"></i>
        <a href="index.html">login</a>
      </div>
    </div>
  </div>

  <section>
    <div class="register-form-box">
      <div class="register-form-value">
          <form action="">
            <h2>Reset Password</h2>
              <div class="email registerationInput">
                <input type="email" name="email" placeholder=" " required />
                <label>Email</label>
              </div>
            <div class="email registerationInput">
              <input
                type="text"
                name="verification_code"
                placeholder=" "
                maxlength="32"
                required
                style="font-family: monospace; letter-spacing: 1px;" />
              <label>Verification Code</label>
            </div>

            <div class="password registerationInput">
              <input type="password" name="password" placeholder=" " required minlength="8" />
              <label>New Password (min 8 characters)</label>
            </div>

            <div class="passwordConfirmation registerationInput">
              <input type="password" name="confirm_password" placeholder=" " required />
              <label>Confirm Password</label>
            </div>

            <div class="btn">
              <button type="submit">Update Password</button>
            </div>

            <p style="text-align:center; margin-top:15px;">
              <a href="verification.html" style="color:#007bff; text-decoration:none;">
                <i class="fa-solid fa-arrow-left"></i> Request a new code
              </a>
            </p>

          </form>
      </div>
    </div>
  </section>
</body>
</html>
